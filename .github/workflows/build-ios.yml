# Build iOS app on macOS runner; upload .app as artifact.
# Run manually (workflow_dispatch) or on push to main.

name: Build iOS

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  RELEASE_TAG: v1.2.4

jobs:
  build-ios:
    runs-on: macos-latest
    timeout-minutes: 30
    permissions:
      contents: write # gh release upload + artifact
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci --legacy-peer-deps || npm install --legacy-peer-deps

      - name: Build web app
        run: npm run build

      - name: Sync to iOS
        run: npx cap sync ios

      - name: Install CocoaPods
        run: |
          sudo gem install cocoapods
          cd ios/App && pod install && cd ../..

      - name: Build iOS app
        run: |
          cd ios/App
          xcodebuild -workspace App.xcworkspace -scheme App \
            -destination 'generic/platform=iOS' \
            -configuration Release \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            build

      - name: Locate and copy built app
        id: app
        run: |
          APP=$(find ~/Library/Developer/Xcode/DerivedData -name "App.app" -path "*/Build/Products/Release-iphoneos/*" 2>/dev/null | head -1)
          if [ -z "$APP" ]; then
            APP=$(find ios/App -name "App.app" -path "*Release*" 2>/dev/null | head -1)
          fi
          if [ -z "$APP" ]; then
            echo "App.app not found"
            exit 1
          fi
          mkdir -p build/ios
          cp -R "$APP" build/ios/
          echo "app_path=build/ios/App.app" >> $GITHUB_OUTPUT

      - name: Upload App artifact
        uses: actions/upload-artifact@v6
        with:
          name: ios-app-${{ github.run_number }}
          path: build/ios/App.app

      - name: Zip app for release
        run: |
          cd build/ios && zip -r ../Wojakcoinwallet-iOS.app.zip App.app && cd ../..

      - name: Add iOS app to GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ env.RELEASE_TAG }}"
          if ! gh release view "$TAG" &>/dev/null; then
            echo "Release $TAG not found; skipping upload."
            exit 0
          fi
          gh release upload "$TAG" build/Wojakcoinwallet-iOS.app.zip --clobber
          echo "Uploaded iOS app to release $TAG"
