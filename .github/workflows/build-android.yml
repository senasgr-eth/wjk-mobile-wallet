# Build Android APK and upload as workflow artifact + release asset.
# - If Android signing secrets are configured, builds SIGNED release APK.
# - Otherwise falls back to debug APK (for test installs only).
#
# Triggers: push to main, or manual (workflow_dispatch).
#
# Uses Node 24 for JavaScript-based actions (see GitHub deprecation of Node 20 on runners).

name: Build Android

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: android-${{ github.ref }}
  cancel-in-progress: true

env:
  # Opt in to Node.js 24 for @actions/* runtimes (Node 20 deprecated on GHA)
  # https://github.blog/changelog/2025-09-19-deprecation-of-node-20-on-github-actions-runners/
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  # GitHub Release tag for `gh release upload` (create the release if missing).
  RELEASE_TAG: v1.2.4

jobs:
  build-android:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    permissions:
      contents: write # gh release upload + artifact
      actions: write # upload-artifact

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "npm"

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: "temurin"
          java-version: "17"

      - name: Install dependencies
        run: npm ci --legacy-peer-deps || npm install --legacy-peer-deps

      - name: Build web (Next.js static export)
        run: npm run build

      - name: Sync Capacitor Android
        run: npx cap sync android

      - name: Prepare signing keystore (optional)
        id: signing
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          if [ -n "${ANDROID_KEYSTORE_BASE64}" ]; then
            mkdir -p android/app/keystore
            echo "${ANDROID_KEYSTORE_BASE64}" | base64 -d > android/app/keystore/release.keystore
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Build APK
        working-directory: android
        env:
          ANDROID_KEYSTORE_PATH: keystore/release.keystore
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          chmod +x gradlew
          if [ "${{ steps.signing.outputs.enabled }}" = "true" ] && \
             [ -n "${ANDROID_KEYSTORE_PASSWORD}" ] && \
             [ -n "${ANDROID_KEY_ALIAS}" ] && \
             [ -n "${ANDROID_KEY_PASSWORD}" ]; then
            ./gradlew assembleRelease --no-daemon --stacktrace
            echo "APK_PATH=android/app/build/outputs/apk/release/app-release.apk" >> "$GITHUB_ENV"
            echo "APK_LABEL=release" >> "$GITHUB_ENV"
          else
            ./gradlew assembleDebug --no-daemon --stacktrace
            echo "APK_PATH=android/app/build/outputs/apk/debug/app-debug.apk" >> "$GITHUB_ENV"
            echo "APK_LABEL=debug" >> "$GITHUB_ENV"
          fi

      - name: Upload APK artifact
        uses: actions/upload-artifact@v6
        with:
          name: wojakcoinwallet-android-${{ env.APK_LABEL }}-${{ github.run_number }}-${{ github.sha }}
          path: ${{ env.APK_PATH }}
          if-no-files-found: error

      - name: Add APK to GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ env.RELEASE_TAG }}"
          if ! gh release view "$TAG" &>/dev/null; then
            echo "Release $TAG not found; skipping upload."
            exit 0
          fi
          gh release upload "$TAG" "${APK_PATH}" --clobber
          echo "Uploaded Android ${APK_LABEL} APK to release $TAG"

      - name: Summary
        run: |
          echo "### Android build (artifact + release upload)" >> "$GITHUB_STEP_SUMMARY"
          echo "APK type: **${APK_LABEL}**" >> "$GITHUB_STEP_SUMMARY"
          echo "Download APK from this job's **Artifacts** section." >> "$GITHUB_STEP_SUMMARY"
          echo "Release target: \`${{ env.RELEASE_TAG }}\` (if present)." >> "$GITHUB_STEP_SUMMARY"
          echo "SHA: \`${{ github.sha }}\`" >> "$GITHUB_STEP_SUMMARY"
